<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    [v-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center">

  <div id="app" v-cloak class="w-full max-w-md px-4">
    
    <div v-if="checkingAuth" class="flex flex-col items-center justify-center py-12">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-gray-500 text-sm">Verificando sessão...</p>
    </div>

    <div v-else class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
      
      <div class="px-8 pt-8 pb-6 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-100 text-blue-600 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Acesso Admin</h1>
        <p class="text-sm text-gray-500 mt-1">Entre com suas credenciais para continuar</p>
      </div>

      <form @submit.prevent="handleLogin" class="px-8 pb-8 space-y-5">
        
        <div v-if="error" class="bg-red-50 border-l-4 border-red-500 p-4 rounded text-red-700 text-sm flex items-start gap-2">
            <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span>{{ error }}</span>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <div class="relative">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                </svg>
             </div>
             <input
                type="email"
                v-model="email"
                placeholder="admin@exemplo.com"
                required
                class="pl-10 block w-full border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2.5 border shadow-sm transition-colors"
             />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <div class="relative">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
             </div>
             <input
                type="password"
                v-model="password"
                placeholder="••••••••"
                required
                class="pl-10 block w-full border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2.5 border shadow-sm transition-colors"
             />
          </div>
        </div>

        <button type="submit" :disabled="loading"
          class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-70 disabled:cursor-wait transition-all">
          
          <svg v-if="loading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          
          {{ loading ? "Entrando..." : "Acessar Painel" }}
        </button>

      </form>
      
      <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 text-center">
        <a href="https://willianddaniel.github.io/" target="_blank" class="text-xs text-gray-500 hover:text-blue-600 font-medium transition-colors">
          ← Acessar o Portfólio
        </a>
      </div>

    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          checkingAuth: true, // Novo estado para evitar piscar o form se já logado
          email: "",
          password: "",
          loading: false,
          error: null
        };
      },

      async mounted() {
        // Verifica se já está autenticado
        try {
          const res = await fetch("/auth/me", { credentials: "include" });
          if (res.ok) {
            window.location.href = "/dashboard/"; // Redireciona
          } else {
            this.checkingAuth = false; // Libera o form se não logado
          }
        } catch (_) {
          this.checkingAuth = false;
        }
      },

      methods: {
        async handleLogin() {
          this.loading = true;
          this.error = null;

          try {
            const response = await fetch("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({
                email: this.email,
                password: this.password
              })
            });

            if (!response.ok) {
              // Tenta pegar msg do backend ou usa genérica
              const data = await response.json().catch(() => ({}));
              throw new Error(data.message || "Email ou senha incorretos.");
            }

            // Sucesso
            window.location.href = "/dashboard/";

          } catch (err) {
            this.error = err.message;
            this.loading = false;
          }
        }
      }
    }).mount("#app");
  </script>

</body>
</html>
