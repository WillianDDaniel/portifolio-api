<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Projeto</title> <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <style>
        [v-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <div id="app" v-cloak>
        
        <div v-if="pageLoading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        </div>

        <div v-if="!pageLoading && isAuthenticated" class="max-w-4xl mx-auto px-4 py-8">
            
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Editar Projeto</h1>
                    <p class="text-sm text-gray-500">Atualize as informações do seu projeto</p>
                </div>
                <a href="/projects" class="text-sm text-gray-600 hover:text-blue-600 font-medium flex items-center gap-1 transition-colors">
                    ← Voltar para lista
                </a>
            </div>

            <form @submit.prevent="updateProject" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                
                <div class="p-6 md:p-8 space-y-8">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">Imagem de Capa</label>
                            
                            <div class="relative border-2 border-dashed border-gray-300 rounded-lg hover:bg-gray-50 transition-colors p-4 flex flex-col items-center justify-center text-center cursor-pointer min-h-50"
                                 :class="{'border-blue-500 bg-blue-50': imagePreview}">
                                
                                <input type="file" accept="image/*" @change="onFileChange" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                                
                                <div v-if="imagePreview" class="w-full h-full relative">
                                    <img :src="imagePreview" class="max-h-48 mx-auto rounded shadow-sm object-contain" />
                                    <p class="text-xs text-blue-600 mt-2 font-medium">
                                        {{ selectedFile ? 'Arquivo selecionado (Clique para trocar)' : 'Imagem atual (Clique para alterar)' }}
                                    </p>
                                </div>
                                
                                <div v-else class="text-gray-500">
                                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                    <p class="mt-1 text-sm">Carregando imagem...</p>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Live URL (Site no ar)</label>
                                <input type="url" v-model="form.liveUrl" placeholder="https://meusite.com"
                                           class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 px-3 border">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Repo URL (GitHub/GitLab)</label>
                                <input type="url" v-model="form.repoUrl" placeholder="https://github.com/usuario/repo"
                                           class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 px-3 border">
                            </div>
                        </div>
                    </div>

                    <hr class="border-gray-200">

                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-medium text-gray-900">Conteúdo & Traduções</h3>
                            <button type="button" @click="addTranslation" class="text-sm text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1">
                                + Adicionar Idioma
                            </button>
                        </div>

                        <div class="space-y-6">
                            <div v-for="(t, index) in form.translations" :key="index" 
                                 class="bg-gray-50 p-5 rounded-lg border border-gray-200 relative group">
                                
                                <button v-if="index !== 0" type="button" @click="removeTranslation(index)" 
                                        class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                                    </svg>
                                </button>

                                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div class="md:col-span-1">
                                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Idioma</label>
                                        <select v-model="t.language" :disabled="index === 0"
                                                class="block w-full border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 bg-white border shadow-sm">
                                            <option value="pt">🇧🇷 Português</option>
                                            <option value="en">🇺🇸 English</option>
                                            <option value="es">🇪🇸 Español</option>
                                            <option value="fr">🇫🇷 Français</option>
                                        </select>
                                    </div>

                                    <div class="md:col-span-3">
                                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Título</label>
                                        <input type="text" v-model="t.title" required
                                               class="block w-full border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 border shadow-sm">
                                    </div>

                                    <div class="md:col-span-4">
                                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Descrição</label>
                                        <textarea v-model="t.description" rows="3" required
                                                  class="block w-full border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 border shadow-sm"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div v-if="error" class="bg-red-50 border-l-4 border-red-500 p-4 rounded text-red-700 text-sm">
                        {{ error }}
                    </div>
                    <div v-if="success" class="bg-green-50 border-l-4 border-green-500 p-4 rounded text-green-700 text-sm">
                        Projeto atualizado com sucesso! Redirecionando...
                    </div>

                </div>

                <div class="bg-gray-50 px-6 py-4 flex items-center justify-end border-t border-gray-200">
                    <button type="submit" :disabled="submitting"
                            class="inline-flex items-center px-6 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-wait transition-all">
                        <svg v-if="submitting" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        {{ submitting ? statusMessage : "Atualizar Projeto" }}
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    pageLoading: true,
                    submitting: false,
                    isAuthenticated: false,
                    error: null,
                    success: false,
                    statusMessage: "Salvando...",
                    
                    projectId: null, // ID capturado da URL
                    
                    selectedFile: null,
                    imagePreview: null,
                    originalImageUrl: null, // Para manter se não houver upload novo
                    
                    form: {
                        liveUrl: "",
                        repoUrl: "",
                        translations: [
                            { language: "pt", title: "", description: "" }
                        ]
                    }
                };
            },

            async mounted() {
                // 1. Pega ID da URL (assumindo /projects/edit/123)
                const pathParts = window.location.pathname.split('/');
                this.projectId = pathParts[pathParts.length - 1]; 
                
                await this.checkAuthAndLoad();
            },

            methods: {
                async checkAuthAndLoad() {
                    try {
                        const authRes = await fetch("/auth/me", { credentials: "include" });
                        if (!authRes.ok) throw new Error("Não autenticado");
                        
                        this.isAuthenticated = true;
                        
                        // 2. Carrega dados do projeto
                        await this.loadProject();

                    } catch {
                        window.location.href = "/";
                    } finally {
                        this.pageLoading = false;
                    }
                },

                async loadProject() {
                    try {
                        const res = await fetch(`/api/projects/${this.projectId}`, { credentials: "include" });
                        if (!res.ok) throw new Error("Projeto não encontrado");

                        const data = await res.json();
                        
                        // Preenche o form
                        this.form.liveUrl = data.liveUrl;
                        this.form.repoUrl = data.repoUrl;
                        this.form.translations = data.translations;
                        
                        // Configura imagem existente
                        this.originalImageUrl = data.imageUrl;
                        this.imagePreview = data.imageUrl; // Mostra a atual no preview

                    } catch (err) {
                        this.error = "Erro ao carregar dados do projeto.";
                    }
                },

                addTranslation() {
                    this.form.translations.push({ language: "en", title: "", description: "" });
                },

                removeTranslation(index) {
                    this.form.translations.splice(index, 1);
                },

                onFileChange(event) {
                    const file = event.target.files && event.target.files[0];
                    if (file) {
                        this.selectedFile = file;
                        this.error = null;
                        
                        // Preview local do arquivo novo
                        const reader = new FileReader();
                        reader.onload = (e) => { this.imagePreview = e.target.result; };
                        reader.readAsDataURL(file);
                    }
                },

                async updateProject() {
                    this.submitting = true;
                    this.error = null;
                    this.success = false;
                    this.statusMessage = "Validando...";

                    try {
                        const mainTitle = this.form.translations[0]?.title?.trim();
                        if (!mainTitle) throw new Error("O título principal é obrigatório.");

                        let finalImageUrl = this.originalImageUrl;

                        // Se escolheu arquivo novo, faz upload
                        if (this.selectedFile) {
                            this.statusMessage = "Enviando nova imagem...";
                            
                            // Assinatura Cloudinary
                            const sigRes = await fetch(`/uploads/cloudinary-signature?projectTitle=${encodeURIComponent(mainTitle)}`, { credentials: "include" });
                            if (!sigRes.ok) throw new Error("Erro na assinatura de upload.");
                            const sigData = await sigRes.json();

                            // Upload
                            const formData = new FormData();
                            formData.append("file", this.selectedFile);
                            formData.append("api_key", sigData.apiKey);
                            formData.append("timestamp", sigData.timestamp);
                            formData.append("signature", sigData.signature);
                            formData.append("public_id", sigData.publicId);

                            const uploadRes = await fetch(`https://api.cloudinary.com/v1_1/${sigData.cloudName}/image/upload`, { method: "POST", body: formData });
                            if (!uploadRes.ok) throw new Error("Falha no upload da imagem.");
                            const uploadData = await uploadRes.json();
                            
                            finalImageUrl = uploadData.secure_url;
                        }

                        // Atualiza no Banco (PUT)
                        this.statusMessage = "Salvando alterações...";
                        const projectRes = await fetch(`/api/projects/${this.projectId}`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            credentials: "include",
                            body: JSON.stringify({
                                imageUrl: finalImageUrl,
                                liveUrl: this.form.liveUrl,
                                repoUrl: this.form.repoUrl,
                                translations: this.form.translations
                            })
                        });

                        if (!projectRes.ok) throw new Error("Erro ao atualizar o projeto.");

                        this.success = true;
                        this.statusMessage = "Atualizado!";
                        
                        setTimeout(() => {
                            window.location.href = '/projects';
                        }, 1500);

                    } catch (err) {
                        this.error = err.message || "Erro inesperado ao atualizar.";
                        this.submitting = false;
                    }
                }
            }
        }).mount("#app");
    </script>
</body>
</html>
